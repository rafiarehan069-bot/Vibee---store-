<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Store</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#fafafa;
color:#333;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

header h1{
font-size:32px;
}

nav{
margin-top:10px;
}

nav a{
color:white;
text-decoration:none;
margin:0 12px;
font-weight:bold;
}

.hero{
background:linear-gradient(to right,#f8e8ff,#ffffff);
padding:60px 20px;
text-align:center;
}

.hero h2{
font-size:40px;
margin-bottom:15px;
}

.hero p{
font-size:18px;
margin-bottom:20px;
}

.btn{
display:inline-block;
background:#111;
color:white;
padding:12px 25px;
border-radius:30px;
text-decoration:none;
}
  
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px 20px;
}

.card{
background:#fff;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.1);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card-content{
padding:20px;
text-align:center;
}

.card h3{
margin-bottom:10px;
}

.price{
font-size:22px;
font-weight:bold;
margin:10px 0;
}

.buy-btn{
display:inline-block;
background:#111;
color:#fff;
padding:10px 20px;
border-radius:25px;
text-decoration:none;
}

footer{
background:#111;
color:#fff;
text-align:center;
padding:20px;
margin-top:40px;
}
</style>
</head>

<body>
  <div class="card">
  <img src="images/product1.jpg" alt="Product 1">
  <div class="card-content">
    <h3>Beauty Essential</h3>
    <p class="price">$12.99</p>
    <a href="#" class="buy-btn">Shop Now</a>
  </div>
</div>

<div class="card">
  <img src="images/product2.jpg" alt="Product 2">
  <div class="card-content">
    <h3>Fashion Bag</h3>
    <p class="price">$19.99</p>
    <a href="#" class="buy-btn">Shop Now</a>
  </div>
</div>

<div class="card">
  <img src="images/product3.jpg" alt="Product 3">
  <div class="card-content">
    <h3>Home Decor</h3>
    <p class="price">$15.99</p>
    <a href="#" class="buy-btn">Shop Now</a>
  </div>
</div>

<div class="card">
  <img src="images/product4.jpg" alt="Product 4">
  <div class="card-content">
    <h3>Kitchen Gadget</h3>
    <p class="price">$9.99</p>
    <a href="#" class="buy-btn">Shop Now</a>
  </div>
</div>
</section>

<footer>
  <p>&copy; 2026 Vibe Store. All Rights Reserved.</p>
</footer>

</body>
</html>
