
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibee Store</title>

<style>
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#faf8f5;
    color:#333;
}

header{
    text-align:center;
    padding:30px 15px;
    background:white;
}

.logo{
    font-size:35px;
    font-weight:bold;
    letter-spacing:2px;
}

nav a{
    text-decoration:none;
    color:#555;
    margin:10px;
    font-size:15px;
}

.hero{
    text-align:center;
    padding:50px 20px;
}

.hero h1{
    font-size:40px;
}

.hero p{
    color:#777;
}

.btn{
    display:inline-block;
    background:#333;
    color:white;
    padding:12px 30px;
    border-radius:25px;
    text-decoration:none;
    margin-top:20px;
}

.section{
    padding:30px 20px;
    text-align:center;
}

.products{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.card{
    background:white;
    width:220px;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 15px #ddd;
}

.card h3{
    margin:10px;
}

footer{
    text-align:center;
    padding:20px;
    background:white;
    margin-top:30px;
}
</style>

</head>

<body>

<header>
<div class="logo">Vibee Store</div>

<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Beauty</a>
<a href="#">Fashion</a>
<a href="#">Contact</a>
</nav>
</header>


<section class="hero">
<h1>Trending Finds ✨</h1>
<p>Discover aesthetic products you will love</p>

<a class="btn" href="#">Shop Now</a>
</section>


<section class="section">

<h2>Explore Categories</h2>

<div class="products">

<div class="card">
<h3>Beauty 💄</h3>
<p>Must-have beauty products</p>
</div>

<div class="card">
<h3>Fashion 👗</h3>
<p>Latest trendy styles</p>
</div>

<div class="card">
<h3>Gadgets ✨</h3>
<p>Smart lifestyle finds</p>
</div>

</div>

</section>


<footer>
<p>© 2026 Vibee Store</p>
</footer>

</body>
</html>
